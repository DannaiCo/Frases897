<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dia de la madre 2026</title>

  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@1,800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 897px;
      height: 192px;
      font-family: "Open Sans", sans-serif;
      font-weight: 800;
      font-style: italic;
    }

    .contenedor {
      position: relative;
      width: 897px;
      height: 192px;
    }

    video#fondoVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .frase {
      position: absolute;
      top: 55%;
      left: 73.4%;
      transform: translate(-50%, -50%);
      width: 30%;
      max-width: 364px;
      text-align: center;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 300;
      font-style: normal;
      color: #F3574A;
      font-family: "Open Sans", sans-serif;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      word-wrap: break-word;
      white-space: normal;
    }

    .mostrar {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="contenedor">
    <video autoplay muted loop playsinline id="fondoVideo">
      <source src="fondo.mp4" type="video/mp4">
      Cargando.
    </video>

    <div class="frase" id="frase"></div>
  </div>

<script>
  const frases = [
   "Usted no se manda solo.",
"Mientras viva bajo este techo, se hace lo que yo diga",
"No me abra los ojos que no le voy a echar gotas",
"Si sus amigos se tiran de un puente, ¿usted también?",
"Le entra por un oído y le sale por el otro",
"Cuento hasta 3...",
"¡Búsqueme que me va a encontrar!",
"Algún día me lo va a agradecer.",
"Cuando tengas hijos, te vas a acordar de mí.",
    
  ];

  const el = document.getElementById("frase");
  let index = Math.floor(Math.random() * frases.length);

  function mostrarFrase() {
    el.classList.remove("mostrar");

    setTimeout(() => {
      el.innerText = frases[index];
      el.classList.add("mostrar");
      index = (index + 1) % frases.length;
    }, 500);
  }

  // Mostrar primera frase
  mostrarFrase();

  // Rotar cada 5 segundos
  setInterval(mostrarFrase, 5000);
</script>

</body>
</html>
